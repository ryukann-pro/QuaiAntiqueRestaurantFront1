<!DOCTYPE html>
<div class="hero-scene text-center text-white">
  <div class="hero-scene-content">
    <h1>Inscription</h1>
  </div>
</div>
<div class="container">
  <form>
    <div class="mb-3">
      <label for="NomInput" class="form-label">Nom</label>
      <input type="text" class="form-control" id="NomInput" placeholder="votre nom">
      <div class="invalid-feedback">
        le nom est requis
      </div>
    </div>
    <div class="mb-3">
      <label for="PrenomInput" class="form-label">Prénom</label>
      <input type="text" class="form-control" id="PrenomInput" placeholder="votre prénom">
      <div class="invalid-feedback">
        le pré nom est requis
      </div>
    </div>
    <div class="mb-3">
      <label for="MailInput" class="form-label">Email</label>
      <input type="email" class="form-control" id="MailInput" placeholder="test@mail.fr">
      <div class="invalid-feedback">
        L'email doit être au format
      </div>
    </div>
    <div class="mb-3">
      <label for="PasswordInput" class="form-label">Mot de passe</label>
      <input type="password" class="form-control" id="PasswordInput">
      <div class="invalid-feedback">
        Le mot de passe doit contenir au moins 8 caractères, une majuscule, une minuscule, un chiffre et un caractère
        spécial.
      </div>
      <div class="valid-feedback">
        Mot de passe valide.
      </div>
    </div>
    <div class="mb-3">
      <label for="ValidatePasswordInput" class="form-label">Confirmer le mot de passe</label>
      <input type="password" class="form-control" id="ValidatePasswordInput">
    </div>
    <div class="text-center">
      <button type="submit" class="btn btn-primary" id="btn-validation-inscription" disabled>Inscription</button>
    </div>
    <div class="text-center pt-3">
      <a href="/signin">Vous avez déjà un compte ? Connectez-vous ici</a>
    </div>
  </form>
</div>
